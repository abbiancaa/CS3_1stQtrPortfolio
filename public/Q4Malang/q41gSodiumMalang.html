<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Anica Malang">
    <title>Q4 1G Sodium Malang</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<style>
    h1{
        margin: 0.7rem;
        text-align: center;
        color: #4f0c16;
    }

    html{
        font-family: "Lexend";
        font-size: larger;
        background-color: #ffd9df;
        background-image: linear-gradient(100deg, #fbd4dd, #F2AFBC, #e0586c);
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    form, #listCont{
        background-color: #fce6ee;
        padding: 30px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.35);
        border-radius: 20px;
        width: 450px;
        margin: 10px auto;
        color: #4f0c16;
    }

    ul{
        padding: 0 1rem;
    }

    .buttons{
        width: 100%;
        display: block;
        justify-content: center;
        font-size: large;
        padding: 5px;

        background-color: #e0586c;
        color: white;
        border: none;
        border-radius: 5px;
    }

    input{
        width: 100%;
        height: auto;
        margin-bottom: 1px;
        font-size: large;
        box-sizing: border-box;
    }

    select{
        width: 100%;
        height: auto;
        margin-bottom: 1px;
        font-family: "Lexend";
        font-size: medium;
        box-sizing: border-box;
        background-color: white;;
    }

    .rating{
        display: flex;
        font-size: 1.3rem;
        gap: 5px;
        cursor: pointer;
    }

    .rating .checked{
        color: #f0cd5a;
    }

    input:focus, select:focus, textarea:focus{
        outline: #4f0c16 solid 2px;
        border-radius: 5px;
        border-width: 1.5px;
    }

</style>

<body>

<form>
    <h1>Add a Movie</h1>

    <label for="title">Title:</label><br>
    <input class="txt" type="text" id="title" name="title" required><br><br>

    <label for="date">Release Year:</label><br>
    <input class="txt" type="number" id="date" name="date" required><br><br>

    <label for="genre">Genre:</label><br>
        <select id="genre" name="genre" required>
            <option value="Select Genre">Select Genre</option>
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
            <option value="Romance">Romance</option>
        </select> <br><br>

    <div class="container">
        <label for="sCont">Rating:</label><br>

        <div id="sCont" class="rating">
            <span data-value="1" class="fa fa-star"></span>
            <span data-value="2" class="fa fa-star"></span>
            <span data-value="3" class="fa fa-star"></span>
            <span data-value="4" class="fa fa-star"></span>
            <span data-value="5" class="fa fa-star"></span>
        </div>
    </div> <hr>

    <button type="submit" id="add" class="buttons">Add Movie</button>
</form>

<div id="listCont">
    <h1>Movie List</h1>
    <ul id="Main"></ul>
</div>

<script>

    let rating = 0;
    document.querySelectorAll('#sCont span').forEach(s => {
        s.onclick = function(){
            rating = this.getAttribute("data-value");
            addStars(rating);
        }
    });

    function addStars(){
        document.querySelectorAll('#sCont span').forEach(s => {
            s.classList.toggle("checked", s.getAttribute("data-value") <= rating);
        });
    }

    let allMovies = [];

    var jlist = JSON.parse(localStorage.getItem("allMovies"));

    if(jlist){
        allMovies = jlist || [];
        render();
    }

    document.querySelector('#add').addEventListener('click', (e) => {
        e.preventDefault();

        movieO = {
            title: document.querySelector('#title').value,
            date: document.querySelector('#date').value,
            genre: document.querySelector('#genre').value,
            rating: rating
        }

        allMovies.push(movieO);
        render();
        
        localStorage.setItem("allMovies", JSON.stringify(allMovies));

        console.log("Movie added!" + JSON.stringify(allMovies));
    });

    function render() {
        document.querySelector('#Main').innerHTML = allMovies.map(m => 
            `<li>${m.title} (${m.date}) - ${m.genre}, Rating: <span style="color: #f0cd5a;">
            ${"★".repeat(m.rating)}</span></li>`).join('');
    }
</script>

</body>
</html>
